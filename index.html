<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Site</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="whole-frame-1">

    <!-- HEADER -->
    <div class="header-17">
      <div class="frame-2-18">

        <div class="merch-button-19">
          <img src="images/image-5-20.png" class="image" alt="merch" />
        </div>

        <div class="games-button-21">
          <img src="images/image-3-22.png" class="image" alt="games" />
        </div>

        <div class="logo-23">
          <div class="logo">
            <div class="rectangle"></div>
            <img src="images/star-3-26.svg" class="star" />
            <img src="images/star-5-27.svg" class="star" />
            <img src="images/star-4-28.svg" class="star" />
          </div>
        </div>

        <div class="about-button-29">
          <img src="images/image-2-30.png" class="image" alt="about" />
        </div>

        <div class="faq-button-31">
          <img src="images/image-6-32.png" class="image" alt="faq" />
        </div>

      </div>
    </div>

    <!-- MIDDLE -->
    <div class="middle-8">
      <img src="images/node-9.png" class="hero-image" />

      <div class="available-on-10">
        <img src="images/fan-game-11.png" class="image" />
        <img src="images/available-on-12.png" class="image" />
      </div>

      <div class="roblox-border-button-13">
        <img src="images/roblox-logo-15.png" class="image" />
      </div>

      <img src="images/girlyfatesilly-1-16.png" class="hero-image" />
    </div>

    <!-- BOTTOM -->
    <div class="bottom-2">
      <img src="images/image-7-4.png" class="image" />
      <img src="images/image-8-6.png" class="image" />
    </div>

    <img src="images/copyright-7.png" class="image" />

  </div>
</body>
</html>
