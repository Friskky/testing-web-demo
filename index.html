<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girly Fate</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <a href="https://www.reddit.com" target="_blank">
    <img src="images/Merch_Image.png" alt="Merch">
  </a>
  <a href="https://www.reddit.com" target="_blank">
    <img src="images/Games_Image.png" alt="Games">
  </a>
  <a href="https://www.reddit.com" target="_blank">
    <img src="images/About_Image.png" alt="About">
  </a>
  <a href="https://www.reddit.com" target="_blank">
    <img src="images/FAQ_Image.png" alt="FAQ">
  </a>
</header>
<main class="middle">
  <img class="title" src="images/Game_Name_Text.png" alt="Game Name">
  <img class="hero" src="images/Girly_Fate_Silly.png" alt="Girly Fate">
  <img class="fan" src="images/Fan_Game_Text.png" alt="Fan Game">
  <div class="available">
    <img src="images/Available_On_Text.png" alt="Available On">
    <a href="https://www.roblox.com" target="_blank">
      <img src="images/Roblox_Logo.png" alt="Roblox">
    </a>
  </div>
</main>
<footer class="bottom">
  <div class="left">
    <img src="images/Copyright_Text.png" alt="Copyright">
  </div>
  <div class="right">
    <a href="https://www.youtube.com/@Frisky_Crispy" target="_blank">
      <img src="images/Youtube_Pixel_Art.png" alt="YouTube">
    </a>
    <a href="https://steamcommunity.com/profiles/76561199074617101" target="_blank">
      <img src="images/Steam_Pixel_Art.png" alt="Steam">
    </a>
  </div>
</footer>
</body>
</html>
